name: spellcheck
on:
  workflow_dispatch:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]
    branches:
      - main

jobs:
  changed-files:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      EXIST_CHANGED_FILES: ${{ steps.get-changed-files.outputs.EXIST_CHANGED_FILES }}
      CHANGED_FILES: ${{ steps.get-changed-files.outputs.CHANGED_FILES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: get-changed-files
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED_FILES=$(find docs -type f -name "*.md" || true)
          else
            CHANGED_FILES=$(git diff --name-only origin/main HEAD | grep 'docs/.*\.md$' || true)
          fi

          EXIST_CHANGED_FILES=0
          if [ -n "$CHANGED_FILES" ]; then
            EXIST_CHANGED_FILES=1
          fi

          {
            echo "EXIST_CHANGED_FILES=$EXIST_CHANGED_FILES"
            echo "CHANGED_FILES<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  spellcheck:
    needs: changed-files
    if: needs.changed-files.outputs.EXIST_CHANGED_FILES == '1'
    runs-on: ubuntu-latest
    env:
      DICPATH: .hunspell/
      CHANGED_FILES: ${{ needs.changed-files.outputs.CHANGED_FILES }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install hunspell
        run: |
          sudo apt update
          sudo apt install hunspell -y

      - name: Download Valencian dictionary
        run: |
          mkdir -p .hunspell
          curl -L https://raw.githubusercontent.com/Softcatala/catalan-dict-tools/refs/heads/master/resultats/hunspell/catalan-valencia.dic -o .hunspell/ca_ES_valencia.dic
          curl -L https://raw.githubusercontent.com/Softcatala/catalan-dict-tools/refs/heads/master/resultats/hunspell/catalan-valencia.aff -o .hunspell/ca_ES_valencia.aff

      - name: Spell check with hunspell
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILES="$CHANGED_FILES"
          else
            FILES=$(git diff --name-only origin/main HEAD | grep 'docs/.*\.md$' || true)
          fi

          if [ -z "$FILES" ]; then
            echo "No markdown files to check"
            exit 0
          fi

          ERRORS=0

          for FILE in $FILES; do
            if [ ! -f "$FILE" ]; then
              continue
            fi

            echo "Checking $FILE"

            MISSPELLINGS=$(hunspell -d .hunspell/ca_ES_valencia -l "$FILE" || true)
            if [ -n "$MISSPELLINGS" ]; then
              echo "Misspellings found in $FILE:"
              echo "$MISSPELLINGS"
              ERRORS=1
            fi
          done

          if [ "$ERRORS" -ne 0 ]; then
            echo "Spell check failed"
            exit 1
          fi

          echo "Spell check passed"
